name: Eval CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  eval-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run eval unit tests
        run: pytest -q tests/test_eval_runner.py

      - name: CLI help smoke test
        run: python eval/run_eval.py --help
